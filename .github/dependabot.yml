version: 2
# Security updates only. Version-bump PR noise is disabled (open-pull-requests-limit: 0)
# while the protocol is pre-1.0 and dependency churn is not worth the review load.
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
  - package-ecosystem: npm
    directory: "/sdk/ts"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
